name: naqashbandi_shazli
description: "A new Flutter project."

publish_to: 'none' # Remove this line if you wish to publish to pub.dev

version: 1.0.0+1

environment:
  sdk: ^3.12.2

dependencies:
  flutter:
    sdk: flutter


  cupertino_icons: ^1.0.8
  lottie: ^3.1.2
  flutter_staggered_grid_view: ^0.7.0
  smooth_page_indicator: ^2.0.1
  percent_indicator: ^4.2.5
  google_nav_bar: ^5.0.6
  font_awesome_flutter: ^11.0.0
  syncfusion_flutter_pdfviewer: ^33.2.13
  easy_date_timeline: ^2.0.9
  hugeicons: ^1.1.7
  shared_preferences: ^2.3.2
  firebase_auth: ^6.5.4
  firebase_core: ^4.11.0
  cloud_firestore: ^6.6.0
  connectivity_plus: ^7.2.0
  loading_indicator: ^3.1.1
  intl: ^0.20.2
  provider: ^6.1.5+1
  permission_handler: ^12.0.3
  firebase_messaging: ^16.4.1
  animated_text_kit: ^4.2.2
  flutter_svg: ^2.3.0
  vibration: ^3.2.0


dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0

flutter:

  uses-material-design: true

  assets:
     - assets/
     - assets/icons/
     - assets/avatars/

  fonts:
    - family: AutourOne
      fonts:
        - asset: fonts/AutourOne-Regular.ttf
  #       - asset: fonts/Schyler-Italic.ttf
  #         style: italic
    - family: Amiri
      fonts:
        - asset: assets/fonts/Amiri-Regular.ttf
    - family: SpaceGrotesk
      fonts:
        - asset: assets/fonts/SpaceGrotesk-Regular.ttf
    - family: PlusJakartaSans
      fonts:
        - asset: assets/fonts/PlusJakartaSans-Regular.ttf
  #       - asset: fonts/TrajanPro_Bold.ttf
  #         weight: 700
